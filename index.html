<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitShare - Free Literature Platform</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-feather-alt"></i>
        </div>
        <h1>LitShare</h1>
      </div>
      
      <ul class="nav-links">
        <li>
          <a href="#" id="libraryLink" class="nav-item active">
            <i class="fas fa-books"></i>
            <span>Library</span>
          </a>
        </li>
        <li>
          <a href="#" id="uploadLink" class="nav-item">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Upload</span>
          </a>
        </li>
        <li>
          <a href="#" id="loginLink" class="nav-item">
            <i class="fas fa-sign-in-alt"></i>
            <span>Login</span>
          </a>
        </li>
      </ul>

      <div class="user-section" id="userSection" style="display: none;">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-info">
          <span id="userStatus"></span>
          <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Library Section -->
      <section id="librarySection" class="content-section">
        <div class="section-header">
          <h2>Library</h2>
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search literature...">
          </div>
        </div>
        <div id="library" class="library-grid"></div>
      </section>

      <!-- Upload Section -->
      <section id="uploadSection" class="content-section hidden">
        <div class="section-header">
          <h2>Share Your Literature</h2>
        </div>
        <form id="uploadForm" class="upload-form">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Enter the title of your work" required>
          </div>
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" placeholder="Write or paste your literature here..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> Publish
          </button>
        </form>
      </section>

      <!-- Login Section -->
      <section id="loginSection" class="content-section hidden">
        <div class="auth-container">
          <div class="auth-card">
            <div class="auth-header">
              <i class="fas fa-feather-alt"></i>
              <h2>Welcome Back</h2>
              <p>Sign in to share your stories</p>
            </div>
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon">
                  <i class="fas fa-user"></i>
                  <input type="text" id="username" placeholder="Enter your username" required>
                </div>
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="password" placeholder="Enter your password" required>
                </div>
              </div>
              <button type="submit" class="submit-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="database.js"></script>
  <script src="script.js"></script>
</body>
</html>

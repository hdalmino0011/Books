<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitShare - Free Literature Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <h1>LitShare</h1>
      <ul>
        <li><a href="#" id="loginLink">Login</a></li>
        <li><a href="#" id="uploadLink">Upload</a></li>
        <li><a href="#" id="libraryLink">Library</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="loginSection" class="hidden">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </section>

    <section id="uploadSection" class="hidden">
      <h2>Upload Literature</h2>
      <form id="uploadForm">
        <input type="text" id="title" placeholder="Title" required>
        <textarea id="content" placeholder="Write or paste your literature here..." required></textarea>
        <button type="submit">Upload</button>
      </form>
    </section>

    <section id="librarySection">
      <h2>Library</h2>
      <div id="library"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 LitShare. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
